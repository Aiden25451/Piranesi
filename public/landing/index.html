<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piranesi Landing Page</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, sans-serif;
        color: #fff;

        /* Center everything */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        min-height: 100vh;

        /* Black & white diagonal pattern */
        background-color: #000;
        background-image: linear-gradient(
          135deg,
          #111 25%,
          #000 25%,
          #000 50%,
          #111 50%,
          #111 75%,
          #000 75%,
          #000 100%
        );
        background-size: 40px 40px;
      }

      button {
        background: #fff;
        color: #000;
        border: none;
        padding: 0.7rem 1.2rem;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s ease;
      }

      button:hover {
        background: #000;
        color: #fff;
        border: 1px solid #fff;
      }
    </style>
  </head>

  <body>
    <h1>Welcome to the Landing Page!!!</h1>

    <div id="view-loading">Loading...</div>

    <div id="view-error" hidden></div>

    <div id="view-authenticated" hidden>
      <p>Logged in as <span id="user-email"></span></p>
      <h1>User Profile</h1>
      <pre id="user-profile"></pre>
      <button
        onclick="client.logout({ logoutParams: { returnTo: location.origin } })"
      >
        Logout
      </button>
    </div>

    <div id="view-unauthenticated" hidden>
      <button
        onclick="
          client.loginWithRedirect({
            authorizationParams: { screen_hint: 'signup' },
          })
        "
      >
        Signup
      </button>
      <button onclick="client.loginWithRedirect()">Login</button>
    </div>

    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.18/auth0-spa-js.production.js"></script>

    <script>
      const displayView = (name) =>
        ["loading", "error", "authenticated", "unauthenticated"].forEach(
          (v) => (document.getElementById(`view-${v}`).hidden = v !== name),
        );

      const setTextContent = (id, content) =>
        (document.getElementById(id).textContent = content);

      (async () => {
        window.client = await auth0.createAuth0Client({
          domain: "dev-ndl5077kbsgrqxtl.ca.auth0.com",
          clientId: "GBvsFfiYt6krldnSnGfFmFive6vYJszY",
          authorizationParams: { redirect_uri: location.origin },
        });

        if (location.search.includes("error=")) {
          const params = new URLSearchParams(location.search);
          setTextContent(
            "view-error",
            `Error: ${params.get("error")} — ${params.get("error_description")}`,
          );
          displayView("error");
          history.replaceState({}, "", location.pathname);
          return;
        }

        if (
          location.search.includes("code=") &&
          location.search.includes("state=")
        ) {
          await window.client.handleRedirectCallback();
          history.replaceState({}, "", location.pathname);
        }

        if (await window.client.isAuthenticated()) {
          const user = await window.client.getUser();
          setTextContent("user-email", user.email);
          setTextContent("user-profile", JSON.stringify(user, null, 2));
          displayView("authenticated");
          return;
        }

        displayView("unauthenticated");
      })();
    </script>
  </body>
</html>
