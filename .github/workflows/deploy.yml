name: Deploy Lambda

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::210108548781:role/PiranesiLambdaDeployRole
          aws-region: us-east-1

      - name: Install deps
        run: npm ci

      - name: Deploy Lambda
        run: npm run deploy
